<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" role="img" aria-labelledby="title desc">
  <title id="title">Harf-e-Noor calligraphy logo</title>
  <desc id="desc">A minimal mysterious calligraphic monogram and wordmark for Harf-e-Noor.</desc>
  <defs>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#100f0c"/>
      <stop offset=".62" stop-color="#242018"/>
      <stop offset="1" stop-color="#090807"/>
    </linearGradient>
    <filter id="softInk" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation=".65" result="blur"/>
      <feOffset dx="0" dy="1" result="offset"/>
      <feComposite in="SourceGraphic" in2="offset" operator="over"/>
    </filter>
  </defs>

  <rect width="720" height="220" fill="none"/>

  <g transform="translate(30 23)" filter="url(#softInk)">
    <path d="M73 151c48-42 39-99 87-134 28-21 59-17 75-43-5 61-41 88-76 119-31 28-49 52-63 91"
      fill="none" stroke="url(#ink)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M45 65c46-9 87-2 124 20 30 18 56 19 79-5"
      fill="none" stroke="url(#ink)" stroke-width="9" stroke-linecap="round"/>
    <path d="M103 140c44-8 75-29 86-64 9-28-6-46-27-37-19 8-23 33-8 52 18 23 54 26 89 12"
      fill="none" stroke="url(#ink)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M32 164c24-8 43-22 57-42" fill="none" stroke="#9b2f23" stroke-width="9" stroke-linecap="round"/>
    <rect x="205" y="130" width="31" height="31" fill="none" stroke="#9b2f23" stroke-width="5"/>
    <path d="M212 145h17M221 137v17" stroke="#9b2f23" stroke-width="4" stroke-linecap="round"/>
  </g>

  <g transform="translate(310 70)">
    <text x="0" y="44" fill="#171511" font-family="Georgia, 'Times New Roman', serif" font-size="54" font-weight="400" letter-spacing=".5">Harf-e-Noor</text>
    <path d="M3 72h257" stroke="#9b2f23" stroke-width="2" stroke-linecap="round"/>
    <text x="2" y="102" fill="#665f54" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="4.2">CONTEMPORARY CALLIGRAPHY ORIGINALS</text>
  </g>
</svg>
